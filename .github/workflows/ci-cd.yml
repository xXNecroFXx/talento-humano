name: CI/CD Pipeline - TalentoHR

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────
  backend-ci:
    name: Backend - Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run unit & integration tests
        run: npm test -- --coverage --testPathPattern="tests/"
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  # ─── Frontend ──────────────────────────────────────────────
  frontend-ci:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          CI: false

  # ─── Deploy (solo en merge a main) ─────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Render
        run: |
          echo "🚀 Desplegando backend en Render..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Render hook no configurado"

      - name: Notify deployment
        run: |
          echo "✅ Deploy completado en $(date)"
          echo "Backend: https://talento-hr-api.onrender.com"
          echo "Frontend: https://talento-hr.vercel.app"
